{% extends 'base.html' %}
{% load static %}

{% block title %}
Meme Generator
{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'meme_app/css/index.css' %}">
{% endblock %}

{% block content %}

<div class="app">
  <div class="card">
    <h1>Meme Generator</h1>

    <!-- Meme Form -->
    <form id="meme-form">
      <input type="text" id="top-text" placeholder="Text on the top" required>
      <input type="text" id="bottom-text" placeholder="Text on bottom" required>
      <input type="url" id="image-url" placeholder="Image URL" required>
      <button type="submit">Create Meme</button>
    </form>

    <!-- Meme Container -->
    <div id="meme-container"></div>
  </div>
</div>

<!-- Zoom Bar -->
<div class="zoom-bar">
  <span>−</span>
  <input type="range" id="zoom-slider" min="0.5" max="2" step="0.05" value="1">
  <span>+</span>
</div>

{% endblock %}

{% block extra_js %}
<script src="{% static 'meme_app/js/index.js' %}"></script>
{% endblock %}
